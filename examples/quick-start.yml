# Minimal quick-start workflow for the cherry-pick-to action, using the
# workflow's default GITHUB_TOKEN — no secret or PAT setup needed.
#
# Limitation of the default token: pull requests created by this action will
# NOT trigger other workflows, so CI will not run on the cherry-pick PRs
# (close and re-open a PR to run CI on it). For production use, prefer the
# fine-grained-PAT setup shown in cherry-pick-to.yml.
#
# Place this at .github/workflows/cherry-pick-to.yml in the consuming repo.

name: Cherry-pick to release branches

# Run on every push to the default branch — that includes the push GitHub
# creates when a pull request is merged. The action itself then decides
# whether anything needs to be cherry-picked.
on:
  push:
    branches: [ "main" ]

jobs:
  cherry-pick:
    runs-on: ubuntu-latest
    # The default GITHUB_TOKEN is read-only; the action needs these grants.
    permissions:
      contents: write        # push the cherry-pick branches
      pull-requests: write   # create the pull requests
      issues: write          # create the success/failure labels

    steps:
      # No target-branch configuration needed: every label of the form
      # "cherry-pick-to-<branch>" on the merged PR makes the action
      # cherry-pick the pushed commits onto <branch> and open a PR — also
      # when the cherry-pick fails, then with manual-resolution instructions.
      - name: Cherry-pick to labeled target branches
        uses: eclipse-ecal/cherry-pick-to@v1
