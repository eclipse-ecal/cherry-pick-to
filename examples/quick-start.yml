# Minimal quick-start workflow for the cherry-pick-to action, using the
# workflow's default GITHUB_TOKEN — no secret or PAT setup needed.
#
# Limitation of the default token: pull requests created by this action will
# NOT trigger other workflows, so CI will not run on the cherry-pick PRs
# (close and re-open a PR to run CI on it). For production use, prefer the
# fine-grained-PAT setup shown in cherry-pick-to.yml.
#
# Place this at .github/workflows/cherry-pick-to.yml in the consuming repo.

name: Cherry-pick to release branches

# Run on every push to the default branch — that includes the push GitHub
# creates when a pull request is merged. The action itself then decides
# whether anything needs to be cherry-picked.
on:
  push:
    branches: [ "main" ]

jobs:
  cherry-pick:
    runs-on: ubuntu-latest
    # The default GITHUB_TOKEN is read-only; the action needs these grants.
    permissions:
      contents: write        # push the cherry-pick branch
      pull-requests: write   # create the pull request
      issues: write          # create the success/failure labels
    strategy:
      # Keep cherry-picking to the other branches if one target fails.
      fail-fast: false
      matrix:
        # The branches this workflow CAN cherry-pick to (one job per branch).
        # A branch only receives a cherry-pick if the merged PR actually
        # carries its label, e.g. "cherry-pick-to-support/v6.1" — jobs for
        # branches without a matching label simply do nothing.
        # Extend this list whenever a new release branch is created.
        target-branch: [ "support/v6.0", "support/v6.1" ]

    steps:
      # Checks out the repository, cherry-picks the pushed commits onto the
      # target branch (if the merged PR carries the matching label) and opens
      # a PR — also when the cherry-pick fails, then with manual-resolution
      # instructions.
      - name: Cherry-pick to ${{ matrix.target-branch }}
        uses: eclipse-ecal/cherry-pick-to@v1
        with:
          target-branch: ${{ matrix.target-branch }}
