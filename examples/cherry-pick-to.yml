# Production example workflow for a repository consuming the cherry-pick-to
# action, using a fine-grained PAT so that CI runs on the created PRs.
# For a zero-setup variant using the default GITHUB_TOKEN, see quick-start.yml.
# Place this at .github/workflows/cherry-pick-to.yml in the consuming repo.

name: Cherry-pick to release branches

# Run on every push to the default branch — that includes the push GitHub
# creates when a pull request is merged. The action itself then decides
# whether anything needs to be cherry-picked.
on:
  push:
    branches: [ "main" ]

jobs:
  cherry-pick:
    runs-on: ubuntu-latest

    steps:

      # No target-branch configuration needed: every label of the form
      # "cherry-pick-to-<branch>" on the merged PR makes the action
      # cherry-pick the pushed commits onto <branch> and open a PR — also
      # when the cherry-pick fails, then with manual-resolution instructions.
      # Targets are processed one after another; a failure on one target does
      # not stop the others.
      #
      # The action needs a specific fine-grained access token with more
      # permissions. We cannot use the generic GITHUB_TOKEN (i.e. the GitHub
      # Bot), as commits and PRs created by that bot cannot trigger workflow
      # runs.
      #
      # The token must be renewed every year. The action fails with a clear
      # error when the token has expired and warns ahead of time when it is
      # about to expire.
      #
      # Mandatory Token Permissions:
      #   Actions:       Read and write
      #   Contents:      Read and write
      #   Metadata:      Read-only
      #   Pull requests: Read and write
      #   Workflows:     Read and write
      #
      - name: Cherry-pick to labeled target branches
        id: cherry-pick
        uses: eclipse-ecal/cherry-pick-to@v1
        with:
          token: ${{ secrets.CHERRY_PICK_GITHUB_TOKEN }}
          # Optional parameters (defaults shown):
          # label-prefix: 'cherry-pick-to-'
          # allowed-target-branches: ''   # e.g. 'support/* release/*'
          # success-label: 'Auto cherry-pick success ✅'
          # failure-label: 'Auto cherry-pick failure ⚠️'
          # use-draft-pr: 'false'
          # branch-prefix: 'cherry-pick'
          # checkout: 'true'
          # token-expiry-warning-days: '14'
          # error-hint: 'Renewal runbook: https://example.com/renew-cherry-pick-token'

      # Optional: the action exposes outputs (performed, pr-urls, results,
      # source-pr-number) for follow-up steps, e.g. for notifications.
      - name: Print result
        if: steps.cherry-pick.outputs.performed == 'true'
        run: printf 'Created pull requests:\n%s\n' "$PR_URLS"
        env:
          PR_URLS: ${{ steps.cherry-pick.outputs.pr-urls }}
