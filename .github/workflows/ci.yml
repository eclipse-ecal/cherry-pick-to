name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:

# The CI only reads the repository; never let it write anything.
permissions:
  contents: read

jobs:

  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install PyYAML
        run: pip install pyyaml

      - name: Run tests
        run: bash tests/run-tests.sh
        env:
          # On CI every suite must run; skipping (missing git/jq) is a failure.
          REQUIRE_ALL: '1'

  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Shellcheck
        run: shellcheck scripts/*.sh tests/*.sh

  actionlint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      # Installer and actionlint version pinned (supply chain): do not fetch
      # and execute whatever is on the main branch.
      - name: Download actionlint
        run: bash <(curl -fsSL https://raw.githubusercontent.com/rhysd/actionlint/v1.7.7/scripts/download-actionlint.bash) 1.7.7

      - name: Lint workflows and examples
        run: ./actionlint -color .github/workflows/*.yml examples/*.yml
