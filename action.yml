name: 'Cherry Pick To'
description: >-
  Cherry-pick the commits of a push onto every branch named by the merged
  pull request's cherry-pick labels, and open one pull request per target
  branch.

branding:
  icon: git-branch
  color: red

inputs:
  token:
    description: >-
      Token used for checkout, pushing, and the GitHub CLI calls (finding the
      source PR, reading its labels, creating labels and the cherry-pick PRs).
      Defaults to the workflow's GITHUB_TOKEN, which works out of the box
      (given a permissions block with contents/pull-requests/issues write) and
      is great for trying the action out — but pull requests created with it
      cannot trigger other workflows, so CI will not run on the cherry-pick
      PRs. Pass a fine-grained PAT for production use.
    required: false
    default: ${{ github.token }}
  label-prefix:
    description: >-
      Labels of the form "<label-prefix><branch>" on the source pull request
      select the branches to cherry-pick to.
    required: false
    default: 'cherry-pick-to-'
  allowed-target-branches:
    description: >-
      Optional space-separated list of glob patterns (e.g. "support/*
      release/*") restricting which branches may be targeted via labels.
      Empty (the default) allows any branch. Use this to bound what people
      with labeling permissions can trigger.
    required: false
    default: ''
  success-label:
    description: 'Label attached to a created PR when the cherry-pick succeeded.'
    required: false
    default: 'Auto cherry-pick success ✅'
  failure-label:
    description: 'Label attached to a created PR when the cherry-pick failed.'
    required: false
    default: 'Auto cherry-pick failure ⚠️'
  use-draft-pr:
    description: >-
      Create the PR as a draft when the cherry-pick failed. Off by default
      because some repositories (e.g. private repos on free plans) do not
      support draft pull requests, which would make the PR creation fail.
    required: false
    default: 'false'
  branch-prefix:
    description: >-
      Prefix for the created branches. Each branch is named
      "<branch-prefix>/<short-sha>/<target-branch>".
    required: false
    default: 'cherry-pick'
  before-commit:
    description: >-
      Start (exclusive) of the commit range to cherry-pick as a full 40-char
      SHA. Defaults to github.event.before of the push event.
    required: false
    default: ''
  after-commit:
    description: >-
      End (inclusive) of the commit range to cherry-pick as a full 40-char
      SHA. Defaults to github.event.after of the push event.
    required: false
    default: ''
  git-user-name:
    description: >-
      Git user.name for the cherry-picked commits. Defaults to the pusher of
      the triggering push event.
    required: false
    default: ''
  git-user-email:
    description: >-
      Git user.email for the cherry-picked commits. Defaults to the pusher of
      the triggering push event.
    required: false
    default: ''
  checkout:
    description: >-
      Whether the action checks out the repository itself (with full history
      and the given token). Set to "false" to manage the checkout in the
      calling workflow; note that an expired token then fails your checkout
      step before this action can report a meaningful error — use the
      check-token sub-action of this repository before your checkout step in
      that case.
    required: false
    default: 'true'
  token-expiry-warning-days:
    description: 'Emit a workflow warning when the token expires within this many days.'
    required: false
    default: '14'
  error-hint:
    description: >-
      Extra text appended to token error and warning messages, e.g. a link to
      your token renewal runbook or helpdesk ticket.
    required: false
    default: ''

outputs:
  performed:
    description: '"true" if at least one cherry-pick pull request was created.'
    value: ${{ steps.run.outputs.performed == 'true' }}
  pr-urls:
    description: 'Newline-separated URLs of the created cherry-pick pull requests. Empty if none.'
    value: ${{ steps.run.outputs.pr-urls }}
  results:
    description: >-
      JSON array with one entry per discovered target branch:
      [{"target": "...", "outcome": "success|conflict|skipped-...|error",
      "pr-url": "..."}]. Empty array if no cherry-pick label matched.
    value: ${{ steps.run.outputs.results }}
  source-pr-number:
    description: 'Number of the merged pull request the pushed commits belong to. Empty if none was found.'
    value: ${{ steps.pr.outputs.pr_number }}
  token-expiration-date:
    description: 'Expiration date of the token. Empty if the token does not expire.'
    value: ${{ steps.check-token.outputs.expiration-date }}

runs:
  using: composite
  steps:

    # All user-controllable values (branch names, PR titles, labels, pusher
    # identity, ...) are passed to the scripts as environment variables and
    # only ever used as quoted shell variables. Never inline a ${{ }}
    # expression into a `run:` script in this file — that is a script
    # injection vector.

    # Fails with a meaningful message when the token is invalid or expired,
    # and warns when it expires soon. Runs unconditionally (and before the
    # checkout below) so the expiry warning shows up on every push, even
    # ones that end up skipped.
    #
    # Note: with checkout set to 'false', the caller's own checkout step
    # runs before this action and fails cryptically on an expired token; the
    # check-token sub-action of this repository exists for that case.
    - name: Check the token and warn about upcoming expiration
      id: check-token
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.token }}
        WARNING_DAYS: ${{ inputs.token-expiry-warning-days }}
        ERROR_HINT: ${{ inputs.error-hint }}
      run: |
        bash "$GITHUB_ACTION_PATH/scripts/check-token.sh"

    # Runs after the token check, so an expired token fails with a meaningful
    # message instead of checkout's cryptic "could not read Username" error.
    # persist-credentials (default true) stores the token for the later push.
    - name: Checkout
      if: inputs.checkout == 'true'
      uses: actions/checkout@v7
      with:
        # Full history: cherry-picking needs the pushed commit range and the
        # target branches.
        fetch-depth: 0
        token: ${{ inputs.token }}

    - name: Validate the commit range
      id: setup
      shell: bash
      env:
        INPUT_BEFORE: ${{ inputs.before-commit }}
        INPUT_AFTER: ${{ inputs.after-commit }}
        EVENT_BEFORE: ${{ github.event.before }}
        EVENT_AFTER: ${{ github.event.after }}
      run: |
        set -euo pipefail

        before="${INPUT_BEFORE:-$EVENT_BEFORE}"
        after="${INPUT_AFTER:-$EVENT_AFTER}"

        if [[ ! "$before" =~ ^[0-9a-f]{40}$ ]] || [[ ! "$after" =~ ^[0-9a-f]{40}$ ]]; then
          echo "::error::before/after must be full 40-character commit SHAs (got before='$before', after='$after'). Use this action on push events or set the before-commit/after-commit inputs."
          exit 1
        fi

        if [[ "$before" =~ ^0{40}$ ]]; then
          # Push that created the branch: there is no meaningful commit range.
          echo "::notice::Push created a new branch (before is all zeros), nothing to cherry-pick."
          echo "continue=false" >> "$GITHUB_OUTPUT"
          exit 0
        fi

        if ! git rev-parse --git-dir > /dev/null 2>&1; then
          echo "::error::No git repository found in the workspace. Keep the 'checkout' input at 'true', or check out the repository before running this action."
          exit 1
        fi

        # Both range ends must exist locally. In a shallow checkout that is a
        # configuration error; in a full checkout it means the commit is no
        # longer reachable, i.e. it was force-pushed away.
        is_shallow="$(git rev-parse --is-shallow-repository)"
        for commit in "$before" "$after"; do
          if ! git rev-parse -q --verify "$commit^{commit}" > /dev/null; then
            if [ "$is_shallow" = "true" ]; then
              echo "::error::Commit $commit is not available in this shallow checkout. Check out the repository with fetch-depth: 0."
              exit 1
            fi
            echo "::notice::Commit $commit is not reachable anymore (force push?), skipping cherry-pick."
            echo "continue=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
        done

        if ! git merge-base --is-ancestor "$before" "$after"; then
          echo "::notice::$before is not an ancestor of $after (force push?), skipping cherry-pick."
          echo "continue=false" >> "$GITHUB_OUTPUT"
          exit 0
        fi

        {
          echo "before=$before"
          echo "after=$after"
          echo "continue=true"
        } >> "$GITHUB_OUTPUT"

    - name: Find the merged pull request of the pushed commits
      id: pr
      if: steps.setup.outputs.continue == 'true'
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.token }}
        AFTER: ${{ steps.setup.outputs.after }}
      run: |
        set -euo pipefail

        # Unlike a full-text search (gh pr list --search <sha>), this endpoint
        # only returns PRs that actually contain the commit.
        pr_number="$(gh api "repos/$GITHUB_REPOSITORY/commits/$AFTER/pulls" \
          --jq '[.[] | select(.merged_at != null)][0].number // empty')"

        if [ -z "$pr_number" ]; then
          echo "::notice::No merged pull request found for commit $AFTER, skipping cherry-pick."
          echo "continue=false" >> "$GITHUB_OUTPUT"
        else
          echo "Found merged PR #$pr_number for commit $AFTER"
          {
            echo "pr_number=$pr_number"
            echo "continue=true"
          } >> "$GITHUB_OUTPUT"
        fi

    # Every label "<label-prefix><branch>" on the source PR names a target
    # branch — no pre-configured branch list needed.
    - name: Determine the target branches from the pull request labels
      id: targets
      if: steps.pr.outputs.continue == 'true'
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.token }}
        PR_NUMBER: ${{ steps.pr.outputs.pr_number }}
        LABEL_PREFIX: ${{ inputs.label-prefix }}
      run: |
        set -euo pipefail

        labels="$(gh pr view "$PR_NUMBER" --repo "$GITHUB_REPOSITORY" --json labels --jq '.labels[].name')"
        echo "Labels on PR #$PR_NUMBER:"
        printf '%s\n' "$labels"

        targets=""
        while IFS= read -r label; do
          if [ -n "$label" ] && [[ "$label" == "$LABEL_PREFIX"* ]]; then
            targets+="${label#"$LABEL_PREFIX"}"$'\n'
          fi
        done <<< "$labels"

        if [ -z "$targets" ]; then
          echo "::notice::PR #$PR_NUMBER has no '${LABEL_PREFIX}*' label, skipping cherry-pick."
          echo "continue=false" >> "$GITHUB_OUTPUT"
          exit 0
        fi

        echo "Target branches:"
        printf '%s' "$targets"

        # Random heredoc delimiter so that label content cannot terminate the
        # output block early and smuggle in additional outputs.
        delimiter="OUTPUT_EOF_${RANDOM}${RANDOM}${RANDOM}"
        {
          echo "targets<<$delimiter"
          printf '%s' "$targets"
          echo "$delimiter"
          echo "continue=true"
        } >> "$GITHUB_OUTPUT"

    # Cherry-picks to all targets sequentially; a hard failure on one target
    # does not stop the others. Conflicts are not failures — they produce a
    # PR with resolution instructions. The step fails at the end if any
    # target had a hard error (missing branch, failed push, ...).
    - name: Cherry-pick to the target branches and create pull requests
      id: run
      if: steps.targets.outputs.continue == 'true'
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.token }}
        TARGETS: ${{ steps.targets.outputs.targets }}
        BEFORE: ${{ steps.setup.outputs.before }}
        AFTER: ${{ steps.setup.outputs.after }}
        PR_NUMBER: ${{ steps.pr.outputs.pr_number }}
        LABEL_PREFIX: ${{ inputs.label-prefix }}
        BRANCH_PREFIX: ${{ inputs.branch-prefix }}
        SUCCESS_LABEL: ${{ inputs.success-label }}
        FAILURE_LABEL: ${{ inputs.failure-label }}
        USE_DRAFT_PR: ${{ inputs.use-draft-pr }}
        ALLOWED_TARGET_BRANCHES: ${{ inputs.allowed-target-branches }}
        INPUT_USER_NAME: ${{ inputs.git-user-name }}
        INPUT_USER_EMAIL: ${{ inputs.git-user-email }}
        PUSHER_NAME: ${{ github.event.pusher.name }}
        PUSHER_EMAIL: ${{ github.event.pusher.email }}
      run: |
        bash "$GITHUB_ACTION_PATH/scripts/cherry-pick-targets.sh"
