name: 'Cherry Pick To'
description: >-
  Cherry-pick the commits of a push onto a target branch if the merged pull
  request that produced them carries a matching label, then open a pull
  request with the result.

branding:
  icon: git-branch
  color: red

inputs:
  token:
    description: >-
      Token used for checkout, pushing, and the GitHub CLI calls (finding the
      source PR, reading its labels, creating labels and the cherry-pick PR).
      Defaults to the workflow's GITHUB_TOKEN, which works out of the box
      (given a permissions block with contents/pull-requests/issues write) and
      is great for trying the action out — but pull requests created with it
      cannot trigger other workflows, so CI will not run on the cherry-pick
      PRs. Pass a fine-grained PAT for production use.
    required: false
    default: ${{ github.token }}
  target-branch:
    description: 'Branch to cherry-pick onto, e.g. "support/v6.1".'
    required: true
  label-prefix:
    description: >-
      The cherry-pick is performed if the source pull request carries the
      label "<label-prefix><target-branch>".
    required: false
    default: 'cherry-pick-to-'
  success-label:
    description: 'Label attached to the created PR when the cherry-pick succeeded.'
    required: false
    default: 'Auto cherry-pick success ✅'
  failure-label:
    description: 'Label attached to the created PR when the cherry-pick failed.'
    required: false
    default: 'Auto cherry-pick failure ⚠️'
  use-draft-pr:
    description: >-
      Create the PR as a draft when the cherry-pick failed. Off by default
      because some repositories (e.g. private repos on free plans) do not
      support draft pull requests, which would make the PR creation fail.
    required: false
    default: 'false'
  branch-prefix:
    description: >-
      Prefix for the created branch. The branch is named
      "<branch-prefix>/<short-sha>/<target-branch>".
    required: false
    default: 'cherry-pick'
  before-commit:
    description: >-
      Start (exclusive) of the commit range to cherry-pick as a full 40-char
      SHA. Defaults to github.event.before of the push event.
    required: false
    default: ''
  after-commit:
    description: >-
      End (inclusive) of the commit range to cherry-pick as a full 40-char
      SHA. Defaults to github.event.after of the push event.
    required: false
    default: ''
  git-user-name:
    description: >-
      Git user.name for the cherry-picked commits. Defaults to the pusher of
      the triggering push event.
    required: false
    default: ''
  git-user-email:
    description: >-
      Git user.email for the cherry-picked commits. Defaults to the pusher of
      the triggering push event.
    required: false
    default: ''
  checkout:
    description: >-
      Whether the action checks out the repository itself (with full history
      and the given token). Set to "false" to manage the checkout in the
      calling workflow; note that an expired token then fails your checkout
      step before this action can report a meaningful error — use the
      check-token sub-action of this repository before your checkout step in
      that case.
    required: false
    default: 'true'
  token-expiry-warning-days:
    description: 'Emit a workflow warning when the token expires within this many days.'
    required: false
    default: '14'
  error-hint:
    description: >-
      Extra text appended to token error and warning messages, e.g. a link to
      your token renewal runbook or helpdesk ticket.
    required: false
    default: ''

outputs:
  performed:
    description: '"true" if a cherry-pick was attempted and a PR was created.'
    value: ${{ steps.create-pr.outputs.performed == 'true' }}
  cherry-pick-outcome:
    description: '"success" or "failure" if a cherry-pick was attempted, "skipped" otherwise.'
    value: ${{ steps.cherry-pick.outcome }}
  pr-url:
    description: 'URL of the created cherry-pick pull request. Empty if skipped.'
    value: ${{ steps.create-pr.outputs.pr_url }}
  source-pr-number:
    description: 'Number of the merged pull request the pushed commits belong to. Empty if none was found.'
    value: ${{ steps.pr.outputs.pr_number }}
  token-expiration-date:
    description: 'Expiration date of the token. Empty if the token does not expire.'
    value: ${{ steps.check-token.outputs.expiration-date }}

runs:
  using: composite
  steps:

    # All user-controllable values (branch names, PR titles, labels, pusher
    # identity, ...) are passed to the scripts as environment variables and
    # only ever used as quoted shell variables. Never inline a ${{ }}
    # expression into a `run:` script in this file — that is a script
    # injection vector.

    # Fails with a meaningful message when the token is invalid or expired,
    # and warns when it expires soon. Runs unconditionally (and before the
    # checkout below) so the expiry warning shows up on every push, even
    # ones that end up skipped.
    #
    # Note: with checkout set to 'false', the caller's own checkout step
    # runs before this action and fails cryptically on an expired token; the
    # check-token sub-action of this repository exists for that case.
    - name: Check the token and warn about upcoming expiration
      id: check-token
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.token }}
        WARNING_DAYS: ${{ inputs.token-expiry-warning-days }}
        ERROR_HINT: ${{ inputs.error-hint }}
      run: |
        bash "$GITHUB_ACTION_PATH/scripts/check-token.sh"

    # Runs after the token check, so an expired token fails with a meaningful
    # message instead of checkout's cryptic "could not read Username" error.
    # persist-credentials (default true) stores the token for the later push.
    - name: Checkout
      if: inputs.checkout == 'true'
      uses: actions/checkout@v7
      with:
        # Full history: cherry-picking needs the pushed commit range and the
        # target branch.
        fetch-depth: 0
        token: ${{ inputs.token }}

    - name: Validate inputs and set up variables
      id: setup
      shell: bash
      env:
        TARGET_BRANCH: ${{ inputs.target-branch }}
        BRANCH_PREFIX: ${{ inputs.branch-prefix }}
        INPUT_BEFORE: ${{ inputs.before-commit }}
        INPUT_AFTER: ${{ inputs.after-commit }}
        EVENT_BEFORE: ${{ github.event.before }}
        EVENT_AFTER: ${{ github.event.after }}
      run: |
        set -euo pipefail

        before="${INPUT_BEFORE:-$EVENT_BEFORE}"
        after="${INPUT_AFTER:-$EVENT_AFTER}"

        if [[ ! "$before" =~ ^[0-9a-f]{40}$ ]] || [[ ! "$after" =~ ^[0-9a-f]{40}$ ]]; then
          echo "::error::before/after must be full 40-character commit SHAs (got before='$before', after='$after'). Use this action on push events or set the before-commit/after-commit inputs."
          exit 1
        fi

        if [[ "$before" =~ ^0{40}$ ]]; then
          # Push that created the branch: there is no meaningful commit range.
          echo "::notice::Push created a new branch (before is all zeros), nothing to cherry-pick."
          echo "continue=false" >> "$GITHUB_OUTPUT"
          exit 0
        fi

        validate_branch() {
          if [[ "$1" == -* ]] || ! git check-ref-format "refs/heads/$1" > /dev/null; then
            echo "::error::'$1' is not a valid branch name."
            exit 1
          fi
        }

        short_sha="${after:0:7}"
        cherry_pick_branch="$BRANCH_PREFIX/$short_sha/$TARGET_BRANCH"

        validate_branch "$TARGET_BRANCH"
        validate_branch "$cherry_pick_branch"

        if ! git rev-parse --git-dir > /dev/null 2>&1; then
          echo "::error::No git repository found in the workspace. Keep the 'checkout' input at 'true', or check out the repository before running this action."
          exit 1
        fi

        # Both range ends must exist locally. In a shallow checkout that is a
        # configuration error; in a full checkout it means the commit is no
        # longer reachable, i.e. it was force-pushed away.
        is_shallow="$(git rev-parse --is-shallow-repository)"
        for commit in "$before" "$after"; do
          if ! git rev-parse -q --verify "$commit^{commit}" > /dev/null; then
            if [ "$is_shallow" = "true" ]; then
              echo "::error::Commit $commit is not available in this shallow checkout. Check out the repository with fetch-depth: 0."
              exit 1
            fi
            echo "::notice::Commit $commit is not reachable anymore (force push?), skipping cherry-pick."
            echo "continue=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
        done

        if ! git merge-base --is-ancestor "$before" "$after"; then
          echo "::notice::$before is not an ancestor of $after (force push?), skipping cherry-pick."
          echo "continue=false" >> "$GITHUB_OUTPUT"
          exit 0
        fi

        if ! git ls-remote --exit-code --heads origin "refs/heads/$TARGET_BRANCH" > /dev/null; then
          echo "::error::Target branch '$TARGET_BRANCH' does not exist on origin."
          exit 1
        fi

        if git ls-remote --exit-code --heads origin "refs/heads/$cherry_pick_branch" > /dev/null; then
          echo "::notice::Branch '$cherry_pick_branch' already exists on origin (re-run of this workflow, or someone is resolving conflicts on it), skipping cherry-pick."
          echo "continue=false" >> "$GITHUB_OUTPUT"
          exit 0
        fi

        {
          echo "before=$before"
          echo "after=$after"
          echo "cherry_pick_branch=$cherry_pick_branch"
          echo "continue=true"
        } >> "$GITHUB_OUTPUT"

    - name: Find the merged pull request of the pushed commits
      id: pr
      if: steps.setup.outputs.continue == 'true'
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.token }}
        AFTER: ${{ steps.setup.outputs.after }}
      run: |
        set -euo pipefail

        # Unlike a full-text search (gh pr list --search <sha>), this endpoint
        # only returns PRs that actually contain the commit.
        pr_number="$(gh api "repos/$GITHUB_REPOSITORY/commits/$AFTER/pulls" \
          --jq '[.[] | select(.merged_at != null)][0].number // empty')"

        if [ -z "$pr_number" ]; then
          echo "::notice::No merged pull request found for commit $AFTER, skipping cherry-pick."
          echo "continue=false" >> "$GITHUB_OUTPUT"
        else
          echo "Found merged PR #$pr_number for commit $AFTER"
          {
            echo "pr_number=$pr_number"
            echo "continue=true"
          } >> "$GITHUB_OUTPUT"
        fi

    - name: Check whether the pull request has the cherry-pick label
      id: label
      if: steps.pr.outputs.continue == 'true'
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.token }}
        PR_NUMBER: ${{ steps.pr.outputs.pr_number }}
        LABEL_PREFIX: ${{ inputs.label-prefix }}
        TARGET_BRANCH: ${{ inputs.target-branch }}
      run: |
        set -euo pipefail

        wanted_label="${LABEL_PREFIX}${TARGET_BRANCH}"
        labels="$(gh pr view "$PR_NUMBER" --repo "$GITHUB_REPOSITORY" --json labels --jq '.labels[].name')"
        echo "Labels on PR #$PR_NUMBER:"
        printf '%s\n' "$labels"

        # Exact full-line match; a substring match would let e.g.
        # "cherry-pick-to-support/v6.13" also trigger for target "support/v6.1".
        if grep -Fxq -- "$wanted_label" <<< "$labels"; then
          echo "Label '$wanted_label' found, cherry-picking."
          echo "continue=true" >> "$GITHUB_OUTPUT"
        else
          echo "::notice::PR #$PR_NUMBER has no label '$wanted_label', skipping cherry-pick."
          echo "continue=false" >> "$GITHUB_OUTPUT"
        fi

    - name: Create the cherry-pick branch
      id: branch
      if: steps.label.outputs.continue == 'true'
      shell: bash
      env:
        TARGET_BRANCH: ${{ inputs.target-branch }}
        CHERRY_PICK_BRANCH: ${{ steps.setup.outputs.cherry_pick_branch }}
        INPUT_USER_NAME: ${{ inputs.git-user-name }}
        INPUT_USER_EMAIL: ${{ inputs.git-user-email }}
        PUSHER_NAME: ${{ github.event.pusher.name }}
        PUSHER_EMAIL: ${{ github.event.pusher.email }}
      run: |
        set -euo pipefail

        git config user.name  "${INPUT_USER_NAME:-${PUSHER_NAME:-github-actions[bot]}}"
        git config user.email "${INPUT_USER_EMAIL:-${PUSHER_EMAIL:-41898282+github-actions[bot]@users.noreply.github.com}}"

        # Make sure the target branch is available even if the caller
        # restricted the checkout to the pushed branch.
        git fetch origin "+refs/heads/$TARGET_BRANCH:refs/remotes/origin/$TARGET_BRANCH"
        git switch --no-track -c "$CHERRY_PICK_BRANCH" "refs/remotes/origin/$TARGET_BRANCH"

    - name: Cherry-pick the commits between before (exclusive) and after (inclusive)
      id: cherry-pick
      if: steps.label.outputs.continue == 'true'
      continue-on-error: true
      shell: bash
      env:
        BEFORE: ${{ steps.setup.outputs.before }}
        AFTER: ${{ steps.setup.outputs.after }}
      run: |
        set -euo pipefail
        # --empty=drop: skip commits whose changes already exist on the
        # target branch instead of failing on them.
        git cherry-pick --empty=drop "$BEFORE..$AFTER"

    # A successful cherry-pick can still produce no commits at all, when
    # every commit in the range was dropped because its changes already
    # exist on the target branch. No PR can be created from that.
    - name: Check whether the cherry-pick produced commits
      id: result
      if: steps.label.outputs.continue == 'true'
      shell: bash
      env:
        TARGET_BRANCH: ${{ inputs.target-branch }}
        CHERRY_PICK_OUTCOME: ${{ steps.cherry-pick.outcome }}
      run: |
        set -euo pipefail

        if [ "$CHERRY_PICK_OUTCOME" = "success" ] \
            && [ "$(git rev-parse HEAD)" = "$(git rev-parse "refs/remotes/origin/$TARGET_BRANCH")" ]; then
          echo "::notice::All commits were dropped, their changes already exist on '$TARGET_BRANCH'. Nothing to create a PR for."
          echo "continue=false" >> "$GITHUB_OUTPUT"
        else
          echo "continue=true" >> "$GITHUB_OUTPUT"
        fi

    # Runs while a failed cherry-pick is still in its conflicted state so the
    # conflicting files can be listed in the PR description.
    - name: Compose the pull request title and description
      id: describe
      if: steps.result.outputs.continue == 'true'
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.token }}
        PR_NUMBER: ${{ steps.pr.outputs.pr_number }}
        TARGET_BRANCH: ${{ inputs.target-branch }}
        CHERRY_PICK_BRANCH: ${{ steps.setup.outputs.cherry_pick_branch }}
        BEFORE: ${{ steps.setup.outputs.before }}
        AFTER: ${{ steps.setup.outputs.after }}
        CHERRY_PICK_OUTCOME: ${{ steps.cherry-pick.outcome }}
        SUCCESS_LABEL: ${{ inputs.success-label }}
        FAILURE_LABEL: ${{ inputs.failure-label }}
      run: |
        set -euo pipefail

        original_pr_title="$(gh pr view "$PR_NUMBER" --repo "$GITHUB_REPOSITORY" --json title --jq '.title')"
        pr_title="[CP #$PR_NUMBER > $TARGET_BRANCH] $original_pr_title"

        if [ "$CHERRY_PICK_OUTCOME" = "success" ]; then
          pr_label="$SUCCESS_LABEL"
          pr_body="$(cat <<EOF
        # Cherry-pick

        Cherry-picked PR #$PR_NUMBER to branch \`$TARGET_BRANCH\`.
        The cherry-pick was **successful**.

        Please review the changes and **rebase-merge** if desired.
        EOF
          )"
        else
          pr_label="$FAILURE_LABEL"
          conflict_files="$(git diff --name-only --diff-filter=U)"
          pr_body="$(cat <<EOF
        # Cherry-pick failed

        Cherry-picked PR #$PR_NUMBER to branch \`$TARGET_BRANCH\`.
        The cherry-pick has **failed**.

        The following files have caused conflicts:

        \`\`\`
        $conflict_files
        \`\`\`

        ## Resolving

        Please resolve conflicts manually. You can use this PR and branch to your convenience.

        \`\`\`bash
        git fetch origin
        git checkout -b "local/$CHERRY_PICK_BRANCH" "origin/$TARGET_BRANCH"
        git branch -u "origin/$CHERRY_PICK_BRANCH"
        git cherry-pick $BEFORE..$AFTER

        # Resolve conflicts and use
        #     git cherry-pick --continue
        # until all conflicts are resolved.

        git push -f origin "HEAD:$CHERRY_PICK_BRANCH"
        \`\`\`

        After resolving all conflicts, **rebase-merge** this PR.
        EOF
          )"
        fi

        # Random heredoc delimiter so that PR titles or file names cannot
        # terminate the output block early and smuggle in additional outputs.
        delimiter="OUTPUT_EOF_${RANDOM}${RANDOM}${RANDOM}"
        {
          echo "pr_title<<$delimiter"
          printf '%s\n' "$pr_title"
          echo "$delimiter"
          echo "pr_label<<$delimiter"
          printf '%s\n' "$pr_label"
          echo "$delimiter"
          echo "pr_body<<$delimiter"
          printf '%s\n' "$pr_body"
          echo "$delimiter"
        } >> "$GITHUB_OUTPUT"

    - name: Abort the failed cherry-pick and create an empty commit for the PR
      id: abort
      if: steps.result.outputs.continue == 'true' && steps.cherry-pick.outcome == 'failure'
      shell: bash
      env:
        BEFORE: ${{ steps.setup.outputs.before }}
        AFTER: ${{ steps.setup.outputs.after }}
      run: |
        set -euo pipefail

        git cherry-pick --abort

        # Use the bot identity for the placeholder commit, it does not carry
        # any of the pusher's work.
        git -c user.name='github-actions[bot]' \
            -c user.email='41898282+github-actions[bot]@users.noreply.github.com' \
            commit --allow-empty -m "Cherry-pick of $BEFORE..$AFTER failed"

        git log --oneline -n 5

    - name: Push the cherry-pick branch
      id: push
      if: steps.result.outputs.continue == 'true'
      shell: bash
      env:
        CHERRY_PICK_BRANCH: ${{ steps.setup.outputs.cherry_pick_branch }}
      run: |
        set -euo pipefail
        git push origin "HEAD:refs/heads/$CHERRY_PICK_BRANCH"

    - name: Create the pull request
      id: create-pr
      if: steps.result.outputs.continue == 'true'
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.token }}
        TARGET_BRANCH: ${{ inputs.target-branch }}
        CHERRY_PICK_BRANCH: ${{ steps.setup.outputs.cherry_pick_branch }}
        PR_TITLE: ${{ steps.describe.outputs.pr_title }}
        PR_BODY: ${{ steps.describe.outputs.pr_body }}
        PR_LABEL: ${{ steps.describe.outputs.pr_label }}
        CHERRY_PICK_OUTCOME: ${{ steps.cherry-pick.outcome }}
        USE_DRAFT_PR: ${{ inputs.use-draft-pr }}
      run: |
        set -euo pipefail

        if [ "$CHERRY_PICK_OUTCOME" = "success" ]; then
          label_color="0e8a16"  # green
        else
          label_color="d93f0b"  # red
        fi

        # Create the label if it does not exist yet. Exact match against the
        # full list; `gh label list | grep` would match substrings and only
        # sees the first 30 labels.
        existing_labels="$(gh label list --repo "$GITHUB_REPOSITORY" --limit 1000 --json name --jq '.[].name')"
        if ! grep -Fxq -- "$PR_LABEL" <<< "$existing_labels"; then
          if ! gh label create "$PR_LABEL" --repo "$GITHUB_REPOSITORY" --color "$label_color"; then
            # A parallel matrix job for another target branch may have
            # created the label in the meantime; only fail if it is still
            # missing.
            existing_labels="$(gh label list --repo "$GITHUB_REPOSITORY" --limit 1000 --json name --jq '.[].name')"
            if ! grep -Fxq -- "$PR_LABEL" <<< "$existing_labels"; then
              echo "::error::Could not create label '$PR_LABEL'."
              exit 1
            fi
          fi
        fi

        args=(
          --repo  "$GITHUB_REPOSITORY"
          --base  "$TARGET_BRANCH"
          --head  "$CHERRY_PICK_BRANCH"
          --title "$PR_TITLE"
          --body  "$PR_BODY"
          --label "$PR_LABEL"
        )
        # Some repos (like personal ones) might not have the draft PR feature.
        if [ "$CHERRY_PICK_OUTCOME" = "failure" ] && [ "$USE_DRAFT_PR" = "true" ]; then
          args+=(--draft)
        fi

        pr_url="$(gh pr create "${args[@]}")"
        echo "Created pull request: $pr_url"
        {
          echo "pr_url=$pr_url"
          echo "performed=true"
        } >> "$GITHUB_OUTPUT"

        printf 'Cherry-pick to `%s`: **%s** — %s\n' \
          "$TARGET_BRANCH" "$CHERRY_PICK_OUTCOME" "$pr_url" >> "$GITHUB_STEP_SUMMARY"
